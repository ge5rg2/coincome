version: "3.8"

services:
  db:
    image: postgres:18-alpine
    container_name: coincome_db
    restart: always
    environment:
      POSTGRES_USER: coin_user
      POSTGRES_PASSWORD: pwd123
      POSTGRES_DB: coincome
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coin_user -d coincome"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: coincome_app
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # 로컬 개발 시에는 코드를 바로 반영하기 위해 마운트 (운영 시에는 제거 가능)
      - .:/app
      - /app/venv/
    environment:
      - LANG=ko_KR.UTF-8
      - LC_ALL=ko_KR.UTF-8
      - PYTHONIOENCODING=utf-8

volumes:
  # 데이터베이스 데이터가 서버가 꺼져도 날아가지 않도록 보존하는 영구 저장소
  postgres_data:
