name: Deploy to AWS Lightsail

# main 브랜치에 push(또는 PR Merge)가 일어날 때만 실행
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH to Lightsail and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd /home/ubuntu/coincome
            git pull origin main

            # 1. 기존 봇을 먼저 완전히 종료
            docker-compose stop app
            docker-compose rm -f app

            # 2. 새 코드로 컨테이너 빌드
            docker-compose build app

            # ---------------------------------------------------
            # 🌟 [핵심] 봇을 켜기 전, DB 구조를 최신화하는 작업 🌟
            # (만약 이미 추가된 컬럼이라면 스크립트가 알아서 스킵합니다)
            # ---------------------------------------------------

            # 1) 정기 보고 관련 컬럼 마이그레이션
            docker-compose run --rm app python -m scripts.add_report_columns.py

            # 2) AI 자동매매 관련 컬럼 마이그레이션 
            docker-compose run --rm app python -m scripts.add_ai_columns
            docker-compose run --rm app python -m scripts.add_ai_max_coins_column
            docker-compose run --rm app python -m scripts.add_paper_trading
            docker-compose run --rm app python -m scripts.add_ai_paper_mode_column
            docker-compose run --rm app python -m scripts.add_ai_renewal_columns

            # ---------------------------------------------------

            # 3. DB 세팅이 모두 끝났으니, 안전하게 새 봇을 실행!
            docker-compose up -d app

            # 4. 쓰레기 청소
            docker image prune -f
