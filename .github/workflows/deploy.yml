name: Deploy to AWS Lightsail

# main 브랜치에 push(또는 PR Merge)가 일어날 때만 실행
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH to Lightsail and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd /home/ubuntu/coincome
            git pull origin main

            # 1. 기존 봇을 먼저 완전히 종료
            docker-compose stop app
            docker-compose rm -f app

            # 2. 새 코드로 컨테이너 빌드
            docker-compose build app

            # ---------------------------------------------------
            # 🌟 [핵심] 봇을 켜기 전, DB 구조를 최신화하는 작업 🌟
            # V2 대청소 이후: 단일 마이그레이션 스크립트만 실행
            #   - MAJOR 엔진 컬럼 3개 추가 (is_major_enabled, major_budget, major_trade_ratio)
            #   - V1 레거시 컬럼 3개 DROP (ai_trade_style, ai_budget_krw, ai_trade_amount)
            # 이미 적용된 환경에서는 자동으로 스킵됩니다 (idempotent).
            # ---------------------------------------------------
            docker-compose run --rm app python -m scripts.add_major_engine_columns

            # ---------------------------------------------------
            # Admin 분석용 컬럼 추가 (idempotent)
            #   - trade_history: bought_at / close_type / ai_version / expected_price
            #   - bot_settings : bought_at / ai_version
            # ---------------------------------------------------
            docker-compose run --rm app python -m scripts.add_admin_analytics_columns

            # ---------------------------------------------------
            # 등급별 엔진 수 제한 컬럼 추가 (idempotent)
            #   - users: max_active_engines (FREE=0, PRO=1, VIP=3)
            # ---------------------------------------------------
            docker-compose run --rm app python -m scripts.add_engine_tier_columns

            # ---------------------------------------------------

            # 3. DB 세팅이 모두 끝났으니, 안전하게 새 봇을 실행!
            docker-compose up -d app

            # 4. 쓰레기 청소
            docker image prune -f
