<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 완료 — CoinCome</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 min-h-screen flex items-center justify-center p-4 font-sans">

  <div class="w-full max-w-sm">

    <!-- ── 로딩 상태 ───────────────────────────────────── -->
    <div id="view-loading" class="bg-gray-900 rounded-2xl border border-gray-800 p-8 shadow-2xl text-center">
      <div class="flex justify-center mb-4">
        <svg class="animate-spin h-10 w-10 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
      </div>
      <p class="text-gray-300 text-sm">결제를 확인하는 중입니다...</p>
    </div>

    <!-- ── 성공 상태 ───────────────────────────────────── -->
    <div id="view-success" class="hidden bg-gray-900 rounded-2xl border border-gray-800 p-8 shadow-2xl text-center">
      <div class="flex justify-center mb-5">
        <div class="w-16 h-16 rounded-full bg-green-500/20 border border-green-500/40 flex items-center justify-center">
          <span class="text-3xl">✅</span>
        </div>
      </div>
      <h1 class="text-white text-xl font-bold mb-2">결제가 완료되었습니다!</h1>
      <p class="text-gray-400 text-sm mb-1">구독이 즉시 활성화되었습니다.</p>
      <p class="text-gray-400 text-sm mb-6">디스코드로 돌아가서 봇을 사용하세요 🎉</p>

      <div class="bg-gray-800/60 rounded-xl border border-gray-700 p-4 mb-6">
        <p class="text-gray-500 text-xs mb-2">활성화된 등급</p>
        <p id="success-tier" class="text-blue-400 font-bold text-lg"></p>
      </div>

      <p class="text-gray-600 text-xs">
        이 창을 닫고 디스코드로 돌아가시면 됩니다.
      </p>
    </div>

    <!-- ── 오류 상태 ───────────────────────────────────── -->
    <div id="view-error" class="hidden bg-gray-900 rounded-2xl border border-gray-800 p-8 shadow-2xl text-center">
      <div class="flex justify-center mb-5">
        <div class="w-16 h-16 rounded-full bg-red-500/20 border border-red-500/40 flex items-center justify-center">
          <span class="text-3xl">❌</span>
        </div>
      </div>
      <h1 class="text-white text-xl font-bold mb-2">오류가 발생했습니다</h1>
      <p id="error-message" class="text-gray-400 text-sm mb-6"></p>
      <a href="javascript:history.back()"
         class="inline-block px-5 py-2 rounded-xl bg-gray-700 hover:bg-gray-600 text-gray-200 text-sm transition-colors">
        ← 이전 페이지로
      </a>
    </div>

  </div><!-- /max-w-sm -->

  <script>
    // ── 뷰 전환 헬퍼 ────────────────────────────────────
    function show(id) {
      ["view-loading", "view-success", "view-error"].forEach(v => {
        document.getElementById(v).classList.toggle("hidden", v !== id);
      });
    }

    // ── 결제 확정 요청 ───────────────────────────────────
    async function confirmPayment() {
      const params = new URLSearchParams(window.location.search);
      const paymentKey = params.get("paymentKey");
      const orderId    = params.get("orderId");
      const amount     = parseFloat(params.get("amount"));
      const userId     = params.get("user_id");
      const tier       = params.get("tier");

      // 필수 파라미터 검증
      if (!paymentKey || !orderId || !amount || !userId || !tier) {
        show("view-error");
        document.getElementById("error-message").textContent =
          "결제 정보가 올바르지 않습니다. 다시 시도해 주세요.";
        return;
      }

      try {
        // 기존 /api/v1/payments/confirm 엔드포인트로 결제 확정
        const res = await fetch("/api/v1/payments/confirm", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            payment_key: paymentKey,
            order_id:    orderId,
            amount:      amount,
            user_id:     userId,
            tier:        tier,
          }),
        });

        // 409 = 이미 처리된 주문 → 성공으로 간주 (새로고침 방지)
        if (!res.ok && res.status !== 409) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.detail || `HTTP ${res.status}`);
        }

        // 성공 화면 표시
        show("view-success");
        const tierLabel = tier === "VIP" ? "👑 VIP" : "🚀 PRO";
        document.getElementById("success-tier").textContent = tierLabel;

      } catch (err) {
        show("view-error");
        document.getElementById("error-message").textContent =
          `결제 확정 중 오류가 발생했습니다: ${err.message}`;
        console.error(err);
      }
    }

    confirmPayment();
  </script>

</body>
</html>
