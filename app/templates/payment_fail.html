<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 실패 — CoinCome</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 min-h-screen flex items-center justify-center p-4 font-sans">

  <div class="w-full max-w-sm">
    <div class="bg-gray-900 rounded-2xl border border-gray-800 p-8 shadow-2xl text-center">

      <div class="flex justify-center mb-5">
        <div class="w-16 h-16 rounded-full bg-red-500/20 border border-red-500/40 flex items-center justify-center">
          <span class="text-3xl">😞</span>
        </div>
      </div>

      <h1 class="text-white text-xl font-bold mb-2">결제에 실패했습니다</h1>
      <p class="text-gray-400 text-sm mb-4">결제가 취소되었거나 오류가 발생했습니다.</p>

      {% if message %}
      <div class="bg-gray-800/60 rounded-xl border border-gray-700 p-3 mb-6 text-left">
        {% if code %}
        <p class="text-gray-500 text-xs mb-1">오류 코드: <span class="text-gray-400 font-mono">{{ code }}</span></p>
        {% endif %}
        <p class="text-red-400 text-sm">{{ message }}</p>
      </div>
      {% else %}
      <div class="mb-6"></div>
      {% endif %}

      <div class="flex flex-col gap-2">
        <a href="javascript:history.back()"
           class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-500 active:bg-blue-700
                  text-white text-sm font-semibold transition-colors">
          다시 시도하기
        </a>
        <p class="text-gray-600 text-xs pt-1">
          문제가 계속 발생하면 디스코드 서버에서 문의해 주세요.
        </p>
      </div>

    </div>
  </div>

</body>
</html>
